<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiVoice TTS - Text to Speech Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🎤 MultiVoice TTS</h1>
<p>Convert Text to Speech in Multiple Languages</p>
</header>

<main>
<textarea id="text" placeholder="Type your text here..."></textarea>

<select id="language">
<option value="ar-SA">العربية</option>
<option value="en-US">English</option>
<option value="fr-FR">Français</option>
</select>

<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">

<button onclick="speakText()">Convert to Speech</button>
<button onclick="stopSpeech()">Stop</button>
</main>

<script src="script.js"></script>

</body>
</html>
